name: Collector — today's starfall snapshot

on:
  schedule:
    - cron: '*/20 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: collector
  cancel-in-progress: true

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/checkout@v4
      - name: Fetch accumulated data branch
        run: |
          git clone --depth 1 --branch data "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" data-tree || mkdir -p data-tree
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: SNAPSHOT_DIR=data-tree node scripts/collect.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish snapshot + history (single-commit branch, full tree kept)
        run: |
          cd data-tree
          rm -rf .git
          git init -b data
          git config user.name "starfall-collector"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "snapshot $(date -u +%FT%TZ)"
          git push --force "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
